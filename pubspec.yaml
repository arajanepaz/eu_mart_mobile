name: eu_mart_mobile
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  http: ^1.2.1
  shared_preferences: ^2.5.4
  intl: ^0.20.3

  firebase_core: ^3.15.2
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.12

  fl_chart: ^1.2.0
  pdf: ^3.13.0
  printing: ^5.15.0

  mobile_scanner: 7.2.0
  file_picker: 10.3.8
  csv: ^8.0.0



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/eu_mart_logo.png
    - assets/images/grocery_overlay.png.png
    - assets/images/EUMART_Logo.png
    

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/EUMART_Logo.png"
  min_sdk_android: 23